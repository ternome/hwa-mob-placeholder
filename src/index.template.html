<!doctype html>
<!-- SOURCE TEMPLATE — do not edit the generated index*.html directly.
     `python3 build.py` fills the placeholders from locales/<lang>.json and writes
     index.html (en) + index.<lang>.html. -->
<html lang="{{lang}}">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <!-- Browser UI / status-bar tint to match the landing background. -->
    <meta name="theme-color" content="#161616" />
    <title>{{page_title}}</title>
    <meta name="description" content="{{meta_description}}" />
    <!-- Self-canonical per locale so the hreflang set in sitemap.xml is valid. -->
    <link rel="canonical" href="{{canonical_url}}" />

    <!-- Open Graph / Twitter (localized; image inherited from the share target). -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{canonical_url}}" />
    <meta property="og:title" content="{{og_title}}" />
    <meta property="og:description" content="{{og_description}}" />
    <meta property="og:locale" content="{{og_locale}}" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="{{og_title}}" />
    <meta name="twitter:description" content="{{og_description}}" />

    <!-- Localized strings consumed by JS (share payload + fallback copy). Built
         per locale; config.js reads this and falls back to English if absent. -->
    <script type="application/json" id="hwa-i18n">{{i18n_json}}</script>

    <!-- Fonts: Roboto Condensed (headline + benefits) and Inter (CTA + support). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Roboto+Condensed:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="preload" as="image" href="assets/laptop.webp" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Share instruction banner ("fake push"). Mounted hidden; shown when the
         native share flow starts, to reinforce the share-sheet steps. This is a
         plain HTML element — NOT a system notification (PLAN §1, §13). -->
    <div
      class="share-instruction"
      data-share-instruction
      role="status"
      aria-live="polite"
      aria-hidden="true"
    >
      <img
        class="share-instruction__icon"
        src="assets/share-apps.webp"
        alt=""
        width="56"
        height="56"
      />
      <div class="share-instruction__content">
        <strong class="share-instruction__title">{{banner_title}}</strong>
        <span class="share-instruction__subtitle">{{banner_subtitle}}</span>
      </div>
      <button
        class="share-instruction__close"
        data-share-instruction-close
        type="button"
        aria-label="{{banner_close_aria}}"
      >
        <svg
          class="share-instruction__close-icon"
          viewBox="0 0 12 12"
          fill="none"
          aria-hidden="true"
        >
          <path
            d="M1 1l10 10M11 1L1 11"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
          />
        </svg>
      </button>
    </div>

    <main class="landing">
      <!-- 1. Laptop visual (Figma composite) with glow FX behind it,
           ported from hwa-offerhub (token / token__fx / token__glow). -->
      <div class="hero">
        <div class="hero__fx" aria-hidden="true">
          <img class="hero__rays" src="assets/fx-light-rays.webp" alt="" />
          <img class="hero__spot" src="assets/fx-glow-spot.webp" alt="" />
          <span class="hero__spark hero__spark--1"></span>
          <span class="hero__spark hero__spark--2"></span>
          <span class="hero__spark hero__spark--3"></span>
          <span class="hero__spark hero__spark--4"></span>
          <span class="hero__spark hero__spark--5"></span>
          <span class="hero__spark hero__spark--6"></span>
        </div>
        <img
          class="hero__glow hero__glow--circle"
          src="assets/glow-circle-blue.webp"
          alt=""
          aria-hidden="true"
        />
        <img
          class="hero__glow hero__glow--blue"
          src="assets/glow-blue.webp"
          alt=""
          aria-hidden="true"
        />
        <img
          class="laptop"
          src="assets/laptop.webp"
          alt="{{img_alt}}"
          width="820"
          height="497"
          fetchpriority="high"
        />
      </div>

      <!-- Right column in landscape; stacked block in portrait. -->
      <div class="content">
        <!-- 2 + 3. Headline and benefits. -->
        <div class="copy">
          <h1 class="headline">{{hero_title}}</h1>
          <ul class="benefits">
            <li class="benefit">
              <span class="benefit__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="m9 10 2 2 4-4" />
                  <rect x="2" y="3" width="20" height="14" rx="2" />
                  <path d="M12 17v4" />
                  <path d="M8 21h8" />
                </svg>
              </span>
              <span class="benefit__text">{{benefit_screen}}</span>
            </li>
            <li class="benefit">
              <span class="benefit__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="22 7 13.5 15.5 8.5 10.5 2 17" />
                  <polyline points="16 7 22 7 22 13" />
                </svg>
              </span>
              <span class="benefit__text">{{benefit_progress}}</span>
            </li>
            <li class="benefit">
              <span class="benefit__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10" />
                  <path d="M2 12h20" />
                  <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                </svg>
              </span>
              <span class="benefit__text">{{benefit_nodownload}}</span>
            </li>
          </ul>
        </div>

        <!-- 4 + 5. CTA and supporting text. -->
        <div class="action">
          <button id="cta" class="cta" type="button">
            <span class="cta__icon" aria-hidden="true">
              <svg viewBox="0 0 17.334 23.934" fill="white" xmlns="http://www.w3.org/2000/svg">
                <path d="M6.05469 7.82227H4.08203C2.48048 7.82227 1.57228 8.73045 1.57227 10.332V17.8516C1.57227 19.4629 2.48047 20.3613 4.08203 20.3613H13.2422C14.8535 20.3613 15.7617 19.4629 15.7617 17.8516V10.332C15.7617 8.73045 14.8535 7.82227 13.2422 7.82227H11.2695V6.25H13.2422C15.8691 6.25 17.334 7.71483 17.334 10.332V17.8516C17.334 20.4786 15.8691 21.9336 13.2422 21.9336H4.08203C1.45508 21.9336 7.04327e-07 20.4786 0 17.8516V10.332C1.07809e-05 7.71483 1.45509 6.25 4.08203 6.25H6.05469V7.82227ZM8.66211 0C8.86719 2.72461e-07 9.0332 0.0585967 9.22852 0.253906L12.4512 3.35938C12.5977 3.50586 12.6758 3.66211 12.6758 3.87695C12.6758 4.27734 12.373 4.56055 11.9629 4.56055C11.7773 4.56054 11.5723 4.4824 11.4355 4.32617L9.93164 2.71484L9.37695 2.13086L9.44336 3.60352V13.5352C9.44336 13.9454 9.08203 14.2871 8.66211 14.2871C8.24219 14.2871 7.89062 13.9454 7.89062 13.5352V3.60352L7.95605 2.12598L7.40234 2.71484L5.88867 4.32617C5.75195 4.48242 5.53711 4.56055 5.35156 4.56055C4.94141 4.56055 4.64844 4.27734 4.64844 3.87695C4.64844 3.66211 4.73633 3.50586 4.88281 3.35938L8.0957 0.253906C8.30078 0.0585963 8.4668 0 8.66211 0Z" />
              </svg>
            </span>
            <span class="cta__label">{{cta_label}}</span>
          </button>
          <p class="support">{{support_text}}</p>
        </div>

        <!-- Live region for fallback / error feedback -->
        <p id="share-status" class="share-status" role="status" aria-live="polite"></p>
      </div>
    </main>

    <script type="module" src="js/main.js"></script>

    <!-- ⚠️ DEBUG locale switcher — TEMPORARY, remove this whole block (then
         rebuild) before release. Jumps between the generated index.<lang>.html
         pages to eyeball each locale. position:fixed + high z-index so it never
         affects the page layout. Self-contained: markup + style + script here. -->
    <div class="dbg-locale">
      <select class="dbg-locale__select" aria-label="Debug: switch locale"></select>
    </div>
    <style>
      .dbg-locale {
        position: fixed;
        top: 8px;
        left: 8px;
        z-index: 2000;
      }
      .dbg-locale__select {
        appearance: auto;
        padding: 6px 8px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.35);
        background: rgba(0, 0, 0, 0.72);
        color: #fff;
        font: 600 12px/1 system-ui, sans-serif;
        -webkit-backdrop-filter: blur(6px);
        backdrop-filter: blur(6px);
      }
    </style>
    <script>
      (function () {
        var LOCALES = [
          ["en", "EN", "index.html"],
          ["ru", "RU", "index.ru.html"],
          ["de", "DE", "index.de.html"],
          ["fr", "FR", "index.fr.html"],
          ["es", "ES", "index.es.html"],
          ["pt", "PT", "index.pt.html"],
          ["it", "IT", "index.it.html"],
          ["pl", "PL", "index.pl.html"],
          ["ja", "JA", "index.ja.html"],
          ["ko", "KO", "index.ko.html"],
          ["zh-hans", "ZH-Hans", "index.zh-hans.html"],
          ["zh-hant", "ZH-Hant", "index.zh-hant.html"]
        ];
        var sel = document.querySelector(".dbg-locale__select");
        if (!sel) return;
        var cur = location.pathname.split("/").pop() || "index.html";
        LOCALES.forEach(function (l) {
          var o = document.createElement("option");
          o.value = l[2];
          o.textContent = l[1];
          if (l[2] === cur) o.selected = true;
          sel.appendChild(o);
        });
        sel.addEventListener("change", function () {
          location.href = sel.value;
        });
      })();
    </script>
  </body>
</html>
